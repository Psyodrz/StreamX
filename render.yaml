services:
  - type: web
    name: streamx-api
    env: node
    plan: free
    buildCommand: "pnpm install && cd apps/api && pnpm run build"
    startCommand: "cd apps/api && pnpm run start"
    envVars:
      - key: NODE_VERSION
        value: 20.12.2
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://stream-x-web-xi.vercel.app,http://localhost:3000
